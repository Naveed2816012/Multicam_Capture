name: Build Windows EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install --upgrade pyinstaller pyinstaller-hooks-contrib

      - name: Build standalone EXE
        run: |
          python -m PyInstaller `
            --clean `
            --noconfirm `
            --onefile `
            --windowed `
            --name MulticamCapture `
            --collect-all cv2 `
            --collect-all mss `
            --collect-all PIL `
            --collect-all imageio_ffmpeg `
            --collect-submodules pygrabber `
            --collect-submodules comtypes `
            --hidden-import PIL._tkinter_finder `
            launcher.py

      - name: Smoke test standalone EXE
        run: |
          & dist\MulticamCapture.exe --self-test
          if ($LASTEXITCODE -ne 0) {
            $log = Join-Path $env:LOCALAPPDATA "MulticamCapture\crash.log"
            if (Test-Path $log) { Get-Content $log }
            exit $LASTEXITCODE
          }

      - name: Build portable ZIP
        run: |
          python -m PyInstaller `
            --clean `
            --noconfirm `
            --onedir `
            --windowed `
            --name MulticamCapture `
            --collect-all cv2 `
            --collect-all mss `
            --collect-all PIL `
            --collect-all imageio_ffmpeg `
            --collect-submodules pygrabber `
            --collect-submodules comtypes `
            --hidden-import PIL._tkinter_finder `
            launcher.py
          Copy-Item README.md dist\MulticamCapture\README.md
          Copy-Item Start_MulticamCapture.bat dist\MulticamCapture\Start_MulticamCapture.bat
          Copy-Item Check_Standalone.bat dist\MulticamCapture\Check_Standalone.bat
          Copy-Item Install_Shortcuts.bat dist\MulticamCapture\Install_Shortcuts.bat
          Copy-Item install_shortcuts.ps1 dist\MulticamCapture\install_shortcuts.ps1
          $zipPath = Join-Path (Resolve-Path dist).Path "MulticamCapture-Windows-Portable.zip"
          if (Test-Path $zipPath) { Remove-Item $zipPath -Force }
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          [System.IO.Compression.ZipFile]::CreateFromDirectory((Resolve-Path dist\MulticamCapture).Path, $zipPath, [System.IO.Compression.CompressionLevel]::Optimal, $true)

      - name: Smoke test portable EXE
        run: |
          & dist\MulticamCapture\MulticamCapture.exe --self-test
          if ($LASTEXITCODE -ne 0) {
            $log = Join-Path $env:LOCALAPPDATA "MulticamCapture\crash.log"
            if (Test-Path $log) { Get-Content $log }
            exit $LASTEXITCODE
          }

      - name: Upload EXE as downloadable artifact
        uses: actions/upload-artifact@v4
        with:
          name: MulticamCapture-Windows
          path: |
            dist/MulticamCapture.exe
            dist/MulticamCapture-Windows-Portable.zip

      - name: Upload EXE as release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/MulticamCapture.exe
            dist/MulticamCapture-Windows-Portable.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
