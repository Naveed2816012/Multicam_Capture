name: Build Windows EXE

# Triggers a build whenever you push a version tag, e.g.:
#   git tag v1.0 && git push origin v1.0
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:  # also allows manual "Run workflow" button on GitHub

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build standalone exe
        run: |
          pyinstaller --onefile --windowed --name MulticamCapture main.py

      - name: Upload exe as release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/MulticamCapture.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
